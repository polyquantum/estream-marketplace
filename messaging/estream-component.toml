[package]
name = "polylabs.polymessenger"
version = "0.12.0"
publisher = "polylabs"
description = "PQ encrypted messaging with blind relay, double-ratchet forward secrecy, RBAC governance, incognito mode, and agent-to-agent/human-to-agent wire protocol"
category = "smart-circuit"
license = "LicenseRef-PolyQuantum-Commercial"

[platform]
minimum = "0.22.0"
flir_api = "1.0.0"

[dependencies]
polykit-identity = ">=0.2.0"
polykit-metering = ">=0.2.0"
polykit-telemetry = ">=0.2.0"
polykit-rate-limiter = ">=0.2.0"

[wire]
packet_range = "0xB0-0xB5"
transport = "udp"
