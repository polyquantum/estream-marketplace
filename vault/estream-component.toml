[package]
name = "polylabs.polypass"
version = "0.12.0"
publisher = "polylabs"
description = "PQ password manager — SPARK biometric vault, credential autofill, breach monitoring, TOTP/HOTP, enterprise RBAC, and team/family sharing"
category = "smart-circuit"
license = "LicenseRef-PolyQuantum-Commercial"

[platform]
minimum = "0.22.0"
flir_api = "1.0.0"

[dependencies]
polykit-identity = ">=0.2.0"
polykit-metering = ">=0.2.0"
polykit-telemetry = ">=0.2.0"
polykit-rate-limiter = ">=0.2.0"

[wire]
packet_range = "0xC0-0xD8"
transport = "udp"
